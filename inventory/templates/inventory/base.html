<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ITAM{% endblock %}</title>
</head>
<body>
    <header>
        <h1>IT Asset Management</h1>
        <nav>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'asset_list' %}">Assets</a>
            <a href="{% url 'employee_list' %}">Employees</a>
            <a href="{% url 'asset_export' %}">Export CSV</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
    </header>

    {% if messages %}
        <section>
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </section>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
